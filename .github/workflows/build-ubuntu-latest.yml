name: build-ubuntu-latest

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
    - name: Install Build Tools in Alpine
      run: |
        apk update
        apk add --no-cache cmake make gcc g++ musl-dev git bash bsd-compat-headers

    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configure, Build and Package
      shell: bash
      run: |
        # 1. 修复 queue.h 缺失问题
        mkdir -p /usr/include/sys
        mkdir -p ${{github.workspace}}/src/sys
        mkdir -p ${{github.workspace}}/src/liblcb/src/sys
        
        if [ -f /usr/include/bsd/sys/queue.h ]; then
          cp /usr/include/bsd/sys/queue.h /usr/include/sys/queue.h
          cp /usr/include/bsd/sys/queue.h ${{github.workspace}}/src/sys/queue.h
          cp /usr/include/bsd/sys/queue.h ${{github.workspace}}/src/liblcb/src/sys/queue.h
        fi

        # 2. 创建并进入 build 目录进行 CMake 编译
        mkdir -p ${{github.workspace}}/build
        cd ${{github.workspace}}/build
        
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DBUILD_TESTING=OFF \
          -DENABLE_TESTS=OFF \
          -DCMAKE_C_FLAGS="-I/usr/include -I${{github.workspace}}/src" \
          -DCMAKE_EXE_LINKER_FLAGS="-static"
          
        cmake --build . --config $BUILD_TYPE -j 16

        # ================= 新增：工业级产物自动搜寻归档 =================
        echo "=== 开始搜寻编译产物 ==="
        # 创建一个绝对干净的交付目录
        mkdir -p ${{github.workspace}}/dist
        
        # 使用 Linux 原生 find 命令，找出 build 目录下所有非 CMake 自带的可执行文件，并复制到 dist 目录中
        # 这能确保不管最终产物叫 msd_lite 还是 msd，都能被成功抓取
        find . -type f -executable \
          ! -path "*/CMakeFiles/*" \
          ! -path "*/tests/*" \
          -exec cp {} ${{github.workspace}}/dist/ \;
          
        echo "=== 归档完成，当前 dist 目录下的产物有： ==="
        ls -la ${{github.workspace}}/dist/

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-musl-static
        # ================= 修改点：直接上传 100% 存在的 dist 目录 =================
        path: ${{github.workspace}}/dist/
        if-no-files-found: error
        retention-days: 7
