name: build-ubuntu-musl

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        compiler: [musl]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          musl-tools \
          musl-dev \
          build-essential \
          libbsd-dev \
          linux-libc-dev \
          libcunit1 libcunit1-dev

    # ❌ 删除你原来的 queue.h 手动 patch（这是不稳定来源）
    # Alpine header + Ubuntu musl 混用是典型“ABI污染”

    - name: Verify musl toolchain
      run: |
        which musl-gcc
        musl-gcc -v
        echo "sysroot:"
        musl-gcc --print-sysroot || true

    - name: Create Build Directory
      run: cmake -E make_directory ${{ github.workspace }}/build

    - name: Configure CMake
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: |
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
          -DENABLE_TESTS=OFF \
          -DCMAKE_C_COMPILER=musl-gcc \
          -DCMAKE_CXX_COMPILER=musl-g++ \
          -DCMAKE_EXE_LINKER_FLAGS="-static" \
          -DCMAKE_C_FLAGS="-I/usr/include/bsd -I${GITHUB_WORKSPACE}/src"

    - name: Build
      working-directory: ${{ github.workspace }}/build
      run: cmake --build . --config ${BUILD_TYPE} -j $(nproc)

    - name: Test
      working-directory: ${{ github.workspace }}/build
      run: ctest -C ${BUILD_TYPE} --output-on-failure

    - name: Collect artifacts
      run: |
        echo "searching binaries..."
        find ${{ github.workspace }}/build -type f -executable -maxdepth 3 -print

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-musl
        path: ${{ github.workspace }}/build
        retention-days: 7
        if-no-files-found: error
