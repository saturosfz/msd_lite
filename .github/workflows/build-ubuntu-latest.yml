name: build-ubuntu-latest

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
    - name: Install Build Tools in Alpine
      run: |
        apk update
        apk add --no-cache cmake make gcc g++ musl-dev git bash bsd-compat-headers

    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configure and Build CMake Project
      shell: bash
      run: |
        # 创建全局和项目内的 sys 目录，防止 queue.h 找不到
        mkdir -p /usr/include/sys
        mkdir -p ${{github.workspace}}/src/sys
        mkdir -p ${{github.workspace}}/src/liblcb/src/sys
        
        if [ -f /usr/include/bsd/sys/queue.h ]; then
          cp /usr/include/bsd/sys/queue.h /usr/include/sys/queue.h
          cp /usr/include/bsd/sys/queue.h ${{github.workspace}}/src/sys/queue.h
          cp /usr/include/bsd/sys/queue.h ${{github.workspace}}/src/liblcb/src/sys/queue.h
        fi

        # 创建并进入 build 目录
        mkdir -p ${{github.workspace}}/build
        cd ${{github.workspace}}/build
        
        # CMake 配置
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DBUILD_TESTING=OFF \
          -DENABLE_TESTS=OFF \
          -DCMAKE_C_FLAGS="-I/usr/include -I${{github.workspace}}/src" \
          -DCMAKE_EXE_LINKER_FLAGS="-static"
          
        # 执行编译
        cmake --build . --config $BUILD_TYPE -j 16

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-musl-static
        # ================= 修改点：精准抓取编译出的可执行文件 =================
        # 使用通配符在 build 目录下递归寻找名为 msd_lite 的文件
        path: ${{github.workspace}}/build/**/msd_lite
        if-no-files-found: error
        retention-days: 7
