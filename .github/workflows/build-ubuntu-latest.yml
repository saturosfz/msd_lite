name: build-ubuntu-latest

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
    - name: Install Build Tools in Alpine
      run: |
        apk update
        apk add --no-cache cmake make gcc g++ musl-dev git bash

    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # ================= 修改点：合并创建、切换路径与配置步骤 =================
    - name: Configure and Build CMake Project
      shell: bash
      run: |
        # 1. 在容器内部原生创建 build 目录
        mkdir -p ${{github.workspace}}/build
        
        # 2. 原生 cd 进去
        cd ${{github.workspace}}/build
        
        # 3. 直接在此处执行 CMake 配置
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DBUILD_TESTING=OFF \
          -DENABLE_TESTS=OFF \
          -DCMAKE_EXE_LINKER_FLAGS="-static"
          
        # 4. 配置成功后，直接原位执行编译（省去多步骤切换路径的麻烦）
        cmake --build . --config $BUILD_TYPE -j 16

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-musl-static
        path: |
          ${{github.workspace}}/build/**/*
          !${{github.workspace}}/build/**/*.o
          !${{github.workspace}}/build/**/CMakeFiles/
        if-no-files-found: error
        retention-days: 7
