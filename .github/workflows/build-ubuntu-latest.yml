name: build-ubuntu-latest

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install libraries and musl
      run: |
        sudo apt-get update
        # 安装 musl-tools (包含 musl-gcc wrapper)
        # 注意：如果您的项目依赖 libcunit，动态库在静态编译时会报错，因此我们需要安装其源码或仅依赖标准库。
        # 这里先安装基础库，并在 CMake 中开启静态链接
        sudo apt-get install cmake musl-tools libcunit-dev

     Tar: Create Build Environment
    - name: Create Build Environment
      run: cmake -E make_directory ${{github.workspace}}/build

    - name: Configure CMake with musl
      shell: bash
      working-directory: ${{github.workspace}}/build
      # 1. 强制指定 C/C++ 编译器为 musl-gcc
      # 2. 通过 CMAKE_EXE_LINKER_FLAGS 注入 -static 参数实现完全静态链接
      run: |
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_C_COMPILER=musl-gcc \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DENABLE_TESTS=0 \
          -DCMAKE_EXE_LINKER_FLAGS="-static"

    - name: Build
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE -j 16

    # 静态编译的程序在当前机器上同样可以测试（musl 在 Ubuntu 上可直接运行）
    - name: Test
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: ctest -C $BUILD_TYPE -j 16 --output-on-failure

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-musl-static
        path: ${{github.workspace}}/build/
        retention-days: 7
